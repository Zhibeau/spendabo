name: EAS Build Android

on:
  push:
    branches:
      - main
    paths:
      - 'spendabo_expo/**'
      - '.github/workflows/expo-eas-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: spendabo_expo/package-lock.json

      - name: Install dependencies
        working-directory: ./spendabo_expo
        run: npm ci

      - name: Sync secrets to EAS environment
        working-directory: ./spendabo_expo
        run: |
          npx eas-cli env:create --environment preview --name FIREBASE_API_KEY --value "$FIREBASE_API_KEY" --visibility sensitive --force --non-interactive
          npx eas-cli env:create --environment preview --name FIREBASE_AUTH_DOMAIN --value "$FIREBASE_AUTH_DOMAIN" --visibility sensitive --force --non-interactive
          npx eas-cli env:create --environment preview --name FIREBASE_PROJECT_ID --value "$FIREBASE_PROJECT_ID" --visibility sensitive --force --non-interactive
          npx eas-cli env:create --environment preview --name FIREBASE_STORAGE_BUCKET --value "$FIREBASE_STORAGE_BUCKET" --visibility sensitive --force --non-interactive
          npx eas-cli env:create --environment preview --name FIREBASE_MESSAGING_SENDER_ID --value "$FIREBASE_MESSAGING_SENDER_ID" --visibility sensitive --force --non-interactive
          npx eas-cli env:create --environment preview --name FIREBASE_APP_ID --value "$FIREBASE_APP_ID" --visibility sensitive --force --non-interactive
          npx eas-cli env:create --environment preview --name GOOGLE_WEB_CLIENT_ID --value "$GOOGLE_WEB_CLIENT_ID" --visibility sensitive --force --non-interactive
          npx eas-cli env:create --environment preview --name BACKEND_URL --value "$BACKEND_URL" --visibility plain-text --force --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}

      - name: Build Android APK (preview)
        working-directory: ./spendabo_expo
        run: npx eas-cli build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
